apiVersion: apps/v1
kind: Deployment
metadata:
  name: rick-morty-deploy
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: rick-morty
  template:
    metadata:
      labels:
        app: rick-morty
    spec:
      containers:
      - name: rick-morty
        image: acrintegradorjese.azurecr.io/rick-morty:v1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: rick-morty-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: rick-morty