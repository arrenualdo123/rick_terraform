sonar.projectKey=rick-morty
sonar.projectName=Rick and Morty App
sonar.projectVersion=2.0

# Directorios fuente
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/*.test.js,**/*.test.jsx

# Pruebas
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8